name: lints

# SLICE_S0_CONTRACT.md §9. brand-drift gate, contract-lint, ddl-lint, i18n-lint, secret scan (mirrors
# .githooks/pre-commit block 1 so a bypassed local hook is still caught), actionlint on the workflows
# themselves, compose-smoke. Runs on every push/PR regardless of path — this is the one workflow that
# is NOT unit-scoped, since drift/secrets/compose health are cross-cutting by nature.
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: lints-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: secret scan (mirrors pre-commit block 1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # Same scanner + pattern file as the pre-commit hook (build/scripts/secret-scan.mjs) —
      # one pattern source, no inline pattern text (self-match) and no grep -q pipeline
      # (pipefail fail-open on large diffs). Both were real shipped bugs; see the scanner's tests.
      - name: scan the diff for staged-secret patterns
        run: |
          set -e
          # BASE must cover the FULL pushed range, not just the tip commit (SECURITY_REVIEW_S0.md
          # concurrency F5): on `push`, github.event.before is the pre-push HEAD, so BASE..HEAD spans
          # every commit in a multi-commit push. HEAD~1 alone only scans the tip commit — a secret added
          # earlier in the same push would land on master unscanned. `before` is the all-zero SHA on a
          # new-branch push and may be missing/unresolvable on a shallow/rewritten history; both fall
          # back to the repo root commit (scan everything) rather than silently narrowing the range.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ] || ! git rev-parse "$BASE" >/dev/null 2>&1; then
            BASE="$(git rev-list --max-parents=0 HEAD)"
          fi
          git diff "$BASE"..HEAD -U0 | node build/scripts/secret-scan.mjs

  brand-drift-gate:
    name: brand-drift gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node --test build/scripts/brand-gate.test.mjs
      - run: node build/scripts/brand-gate.mjs

  contract-lint:
    name: contract-lint (guarded) + adversarial lens regression suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      # Golden vectors + the SECURITY_REVIEW_S0.md adversarial lenses (idor/minor/silent-rejection/
      # trust-boundary/deferred) — these are the permanent regression suite for every fixNow finding;
      # running them here is what makes "now-green" mean something instead of a claim nobody checks.
      - run: node --test tools/contract-lint/contract-lint.test.mjs tools/contract-lint/contract-lint.idor-lens.test.mjs tools/contract-lint/contract-lint.minor-lens.test.mjs tools/contract-lint/contract-lint.silent-rejection.test.mjs tools/contract-lint/contract-lint.trust-boundary.test.mjs tools/contract-lint/contract-lint.deferred.test.mjs
      - run: node tools/contract-lint/contract-lint.mjs

  ddl-lint:
    name: ddl-lint (guarded) + adversarial lens regression suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node --test tools/ddl-lint/ddl-lint.test.mjs tools/ddl-lint/ddl-lint.minor-lens.test.mjs tools/ddl-lint/ddl-lint.pii-residency.adversary.test.mjs
      - name: run against any committed migration SQL fixtures (guarded)
        run: |
          mapfile -d '' FILES < <(find backend -path "*/Migrations/*.sql" -print0 2>/dev/null || true)
          if [ "${#FILES[@]}" -gt 0 ]; then
            node tools/ddl-lint/ddl-lint.mjs "${FILES[@]}"
          else
            echo "ddl-lint SKIP: no migration SQL fixtures exist yet (guarded — S1 is the first consumer)"
          fi

  i18n-lint:
    name: i18n-lint (ARMED at S7 — .xcstrings + strings.xml key-parity ×4 + message-key coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node --test tools/i18n-lint/i18n-lint.test.mjs
      - run: node tools/i18n-lint/i18n-lint.mjs

  token-lint:
    name: token-lint (S7 — manifest ↔ DESIGN.md, platform layers ↔ manifest, brand-delta ↔ brands)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node --test tools/token-lint/token-lint.test.mjs
      - run: node tools/token-lint/token-lint.mjs

  egress-lint:
    name: egress-lint (S7 — zero third-party egress; brand-domain + dev-loopback allowlist only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node --test tools/egress-lint/egress-lint.test.mjs
      - run: node tools/egress-lint/egress-lint.mjs

  destructive-verb-check:
    name: destructive-verb check (golden vectors + adversarial lens)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node --test build/scripts/destructive-verb-check.test.mjs build/scripts/destructive-verb-check.pii-residency.adversary.test.mjs

  edge-guard-assertions:
    name: edge-guard + residency rendered-rule assertions (+ adversarial lens)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node --test infra/edge-guard.test.mjs infra/residency.test.mjs infra/edge-guard.idor-lens.test.mjs

  concurrency-lens:
    name: concurrency adversarial lens (S0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node --test build/scripts/concurrency-lens.test.mjs

  purge-completeness-lens:
    name: purge-completeness adversarial lens (13A non-stores)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node --test infra/purge-completeness.lens.test.mjs

  actionlint:
    name: actionlint on the workflows themselves
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: raven-actions/actionlint@v2

  compose-smoke:
    name: "compose-smoke: up -> health -> down -v -> fresh up -> log sweep"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash build/scripts/compose-smoke.sh
      - name: teardown
        if: always()
        run: docker compose down -v
