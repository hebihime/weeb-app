name: backend

# SLICE_S0_CONTRACT.md §9. Path-filtered so parallel sessions in ios/, android/, web/, infra/ never touch
# this file, and every leg is directory/file-guarded so the pipeline is green on the empty repo today.
on:
  push:
    branches: [master]
    paths:
      - "backend/**"
      - "contracts/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - "contracts/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

env:
  # §8 clause 6: cap CI test parallelism at 4 to start; re-measured at S1.
  DOTNET_TEST_PARALLELISM: 4
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  build-test:
    name: restore / build / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: restore
        run: dotnet restore backend/Svac.sln
      - name: build
        run: dotnet build backend/Svac.sln --no-restore --configuration Release
      - name: test
        run: |
          if find backend -name "*.Tests*.csproj" -o -name "*.Tests*.fsproj" 2>/dev/null | grep -q .; then
            dotnet test backend/Svac.sln --no-build --configuration Release
          else
            echo "backend.yml SKIP: no test project exists yet (empty solution, S0 baseline)"
          fi

  arch-suite:
    name: architecture test suite (1A/4A/13A/15A)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: run arch tests if the project exists
        run: |
          if [ -d backend/tests/Svac.Tests.Architecture ]; then
            dotnet test backend/tests/Svac.Tests.Architecture --configuration Release
          else
            echo "arch-suite SKIP: backend/tests/Svac.Tests.Architecture does not exist yet (guarded — lands at S1)"
          fi

  ef-gate:
    name: EF-migration CI gate (7A)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: ef-gate fixture tests (guard/skip/clause-ordering, no docker or dotnet-ef needed)
        run: node --test build/scripts/ef-gate.test.mjs
      - name: install dotnet-ef
        # MUST match the EF Core pin (Directory.Packages.props: 10.0.9). A v9 tool on a v10 project
        # both misbehaves against ef-gate and regenerates the emit-ddl-script drift file differently
        # than local v10 tooling — a guaranteed drift-gate false-positive. Pin exactly, not a loose major.
        run: dotnet tool install --global dotnet-ef --version 10.0.9 || true
      - name: restore + build the DbContext project
        # `dotnet ef` (has-pending-model-changes, migrations script, database update) loads the compiled
        # model, which needs obj/project.assets.json + the built assembly. This job runs on a fresh runner
        # (needs: build-test does NOT share build output across jobs), so without this step dotnet ef hits
        # NETSDK1004 "assets file not found" and exits non-zero — which ef-gate.sh's loop then misreports
        # as "model drift". Build the WHOLE SOLUTION (not just one context project) — ef-gate + the
        # emit-ddl-script drift gate loop over EVERY DbContext project (domain-core AND each module, e.g.
        # Svac.Identity from S3), so a single-project build leaves later contexts un-restored → NETSDK1004
        # on the new context only. Building the sln covers every current + future module context.
        run: dotnet build backend/Svac.sln -c Debug
      - name: run ef-gate
        run: bash build/scripts/ef-gate.sh backend
      - name: emit-ddl-script drift gate (regenerate + diff, guarded on a migration existing)
        run: |
          if find backend -type d -iname 'Migrations' 2>/dev/null | grep -q .; then
            bash build/scripts/emit-ddl-script.sh
          else
            echo "emit-ddl-script SKIP: no Migrations/ directory yet"
          fi

  thirteen-a-gate:
    name: "13A store-registration gate (S1 - purge-registry drift + completeness)"
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: guard — reserved slot until backend/domain-core/purge-registry.json exists
        id: check
        run: |
          if [ -f backend/domain-core/purge-registry.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "13A-gate SKIP: backend/domain-core/purge-registry.json does not exist yet (guarded — S1 emits it)"
          fi
      - name: emit-purge-registry drift gate (regenerate + diff)
        if: steps.check.outputs.exists == 'true'
        run: bash build/scripts/emit-purge-registry.sh
      - name: completeness check (arch-suite already ran in build-test's dependency chain, but re-assert here as the 13A gate's own named job)
        if: steps.check.outputs.exists == 'true'
        run: dotnet test backend/tests/Svac.Tests.Architecture --configuration Release --filter "FullyQualifiedName~PurgeRegistryGateTests"

  contract-publish:
    name: publish openapi-contract-v0 artifact (guarded)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: check contract exists
        id: check
        run: |
          if [ -f contracts/openapi.v0.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "contract-publish SKIP: contracts/openapi.v0.json does not exist yet (guarded — S1 emits it)"
          fi
      - name: emit-openapi-contract drift gate (regenerate + diff)
        if: steps.check.outputs.exists == 'true'
        run: bash build/scripts/emit-openapi-contract.sh
      - name: contract-lint
        if: steps.check.outputs.exists == 'true'
        run: node tools/contract-lint/contract-lint.mjs contracts/openapi.v0.json
      - name: upload artifact
        if: steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: openapi-contract-v0
          path: contracts/openapi.v0.json
          retention-days: 30

  container-image:
    name: build container image (guarded on a host Dockerfile existing)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - name: check for a host Dockerfile
        id: check
        run: |
          if find backend -maxdepth 3 -iname "Dockerfile*" 2>/dev/null | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "container-image SKIP: no backend host Dockerfile exists yet (guarded — S1 is the first host)"
          fi
      - name: build Svac.PublicApi image (build stage only — no registry push at S1)
        if: steps.check.outputs.exists == 'true'
        run: docker build -f backend/public-host/Svac.PublicApi/Dockerfile -t svac-public-api:ci .
      - name: check for the admin-host Dockerfile
        id: check-admin
        run: |
          if [ -f backend/admin-host/Svac.AdminHost/Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "container-image SKIP: backend/admin-host/Svac.AdminHost/Dockerfile does not exist yet (guarded — S5 is the second host)"
          fi
      - name: build Svac.AdminHost image (build stage only — no registry push; SLICE_S5_CONTRACT.md §0)
        if: steps.check-admin.outputs.exists == 'true'
        run: docker build -f backend/admin-host/Svac.AdminHost/Dockerfile -t svac-admin-host:ci .

  compose-fresh-boot-and-substrate-e2e:
    name: compose fresh-boot health + substrate e2e (SLICE_S1_CONTRACT.md §10.4, guarded)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: check for a public-api compose service
        id: check
        run: |
          if grep -q "public-api:" docker-compose.yml; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "compose-fresh-boot-and-substrate-e2e SKIP: no public-api service in docker-compose.yml yet"
          fi
      - name: compose fresh-boot smoke (BUILD.md §8 clause 2)
        if: steps.check.outputs.exists == 'true'
        run: bash build/scripts/compose-smoke.sh
      - name: substrate e2e against the live stack (SLICE_S1_CONTRACT.md §10.4)
        if: steps.check.outputs.exists == 'true'
        run: SUBSTRATE_E2E_TARGET=http://localhost:8090 node backend/e2e/substrate.e2e.mjs
      - name: check for an admin-host compose service
        id: check-admin
        run: |
          if grep -q "admin-host:" docker-compose.yml; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "SKIP: no admin-host service in docker-compose.yml yet"
          fi
      - name: admin-host /health 200 (SLICE_S5_CONTRACT.md §0 — the real, second host, side by side with public-api)
        if: steps.check.outputs.exists == 'true' && steps.check-admin.outputs.exists == 'true'
        run: curl -f http://localhost:8091/health
      - name: teardown
        if: always()
        run: docker compose down -v
