name: android

# SLICE_S0_CONTRACT.md §9 + SLICE_S7_CONTRACT.md §0/§9g. Matrix brand in {weeb, friki} per 7A.
# GRADUATED at S7: the four guarded jobs are now REAL required runs (dir-guarded for file validity).
# Lane C owns this file (CODEOWNERS).
on:
  push:
    branches: [master]
    paths:
      - "android/**"
      - "maestro/**"
      - "contracts/**"
      - "design/tokens.v1.json"
      - "brands/**"
      - "i18n/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
      - "maestro/**"
      - "contracts/**"
      - "design/tokens.v1.json"
      - "brands/**"
      - "i18n/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: gradlew test${{ matrix.flavor }}DebugUnitTest
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      fail-fast: false
      matrix:
        include:
          - brand: weeb
            flavor: Weeb
          - brand: friki
            flavor: Friki
    steps:
      - uses: actions/checkout@v4
      - name: guard — android/ present (S7)
        id: guard
        run: |
          if [ -d android ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else
            echo "android.yml SKIP (${{ matrix.brand }}): android/ absent (guarded)"; echo "present=false" >> "$GITHUB_OUTPUT"; fi
      - uses: actions/setup-java@v4
        if: steps.guard.outputs.present == 'true'
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
        if: steps.guard.outputs.present == 'true'
      - name: install compileSdk platform + build-tools (setup-android installs none by default)
        if: steps.guard.outputs.present == 'true'
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" >/dev/null 2>&1 || true
          echo "installed platforms:"; ls "$ANDROID_SDK_ROOT/platforms" 2>/dev/null || ls "$ANDROID_HOME/platforms" 2>/dev/null || true
      - uses: gradle/actions/setup-gradle@v4
        if: steps.guard.outputs.present == 'true'
        with:
          # Read-only across the parallel matrix jobs: they otherwise race to SAVE the same cache key
          # ("ReserveCacheError: another job may be creating this cache"), which can restore a partial
          # cache into a sibling job. Reads are shared; no job writes.
          cache-read-only: true
      # The openapi-generator gradle plugin generates the kotlinx-serialization client from the checked-in
      # canonical contracts/openapi.v0.json at build time (B17 consumption proof) — never committed.
      - name: unit + snapshot tests (${{ matrix.flavor }} debug)
        if: steps.guard.outputs.present == 'true'
        working-directory: android
        run: ./gradlew test${{ matrix.flavor }}DebugUnitTest --stacktrace

  string-catalog-lint:
    name: strings.xml / i18n key-parity ×4 (ARMED at S7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node --test tools/i18n-lint/i18n-lint.test.mjs
      - run: node tools/i18n-lint/i18n-lint.mjs

  codegen-openapi-client:
    name: generate kotlin client from the canonical contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: guard — android/ present (S7)
        id: guard
        run: |
          if [ -d android ] && [ -f contracts/openapi.v0.json ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else
            echo "codegen SKIP: android/ or contract absent (guarded)"; echo "present=false" >> "$GITHUB_OUTPUT"; fi
      - uses: actions/setup-java@v4
        if: steps.guard.outputs.present == 'true'
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        if: steps.guard.outputs.present == 'true'
      - name: run the openapi codegen task (compiles generated client against the contract)
        if: steps.guard.outputs.present == 'true'
        working-directory: android
        run: ./gradlew :apikit:openApiGenerate :apikit:compileWeebDebugKotlin --stacktrace

  maestro-brand-smoke:
    name: Maestro brand-smoke (${{ matrix.brand }}) — 14A slot
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - brand: weeb
            flavor: Weeb
            app_id: app.weeb.client.dev
            wordmark: Weeb
            es_handle_title: "Elige tu usuario"
          - brand: friki
            flavor: Friki
            app_id: app.friki.client.dev
            wordmark: Friki
            es_handle_title: "Elige tu usuario"
    steps:
      - uses: actions/checkout@v4
      - name: guard — maestro/ + android/ present (14A; guard points at maestro/, not android/.maestro)
        id: guard
        run: |
          if [ -d maestro ] && [ -d android ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else
            echo "maestro-brand-smoke SKIP (${{ matrix.brand }}): maestro/ or android/ absent (guarded — 14A)"; echo "present=false" >> "$GITHUB_OUTPUT"; fi
      - uses: actions/setup-java@v4
        if: steps.guard.outputs.present == 'true'
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
        if: steps.guard.outputs.present == 'true'
      - name: install compileSdk platform + build-tools (setup-android installs none by default)
        if: steps.guard.outputs.present == 'true'
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" >/dev/null 2>&1 || true
          echo "installed platforms:"; ls "$ANDROID_SDK_ROOT/platforms" 2>/dev/null || ls "$ANDROID_HOME/platforms" 2>/dev/null || true
      - uses: gradle/actions/setup-gradle@v4
        if: steps.guard.outputs.present == 'true'
      - name: assemble debug APK + export its absolute path
        if: steps.guard.outputs.present == 'true'
        working-directory: android
        run: |
          ./gradlew assemble${{ matrix.flavor }}Debug --stacktrace
          # Resolve the APK HERE (correct CWD + filesystem) and hand it to the emulator step via env —
          # the emulator-runner action's own script has an unreliable CWD/$GITHUB_WORKSPACE.
          APK=$(find "$PWD/app/build/outputs/apk" -name "app-${{ matrix.brand }}-debug.apk" | head -1)
          test -n "$APK"
          echo "APK_PATH=$APK" >> "$GITHUB_ENV"
          echo "FLOW_PATH=$GITHUB_WORKSPACE/maestro/flows/brand-smoke/smoke.yaml" >> "$GITHUB_ENV"
          echo "resolved APK_PATH=$APK"
      - name: install maestro
        if: steps.guard.outputs.present == 'true'
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: enable KVM
        if: steps.guard.outputs.present == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm
      - name: boot emulator, install APK, run brand-smoke
        if: steps.guard.outputs.present == 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # APK_PATH / FLOW_PATH were resolved in the assemble step (correct context) and passed via
          # $GITHUB_ENV — the action's own script has an unreliable CWD/$GITHUB_WORKSPACE.
          # Each command on ONE line — the action's script executor mangles `\` line continuations
          # (a continued `maestro test "$FLOW_PATH" \` was parsed with the backslash stuck to the path:
          # "Flow path does not exist: .../\").
          script: |
            set -e
            test -n "$APK_PATH"
            adb install -r "$APK_PATH"
            maestro test "$FLOW_PATH" -e APP_ID=${{ matrix.app_id }} -e BRAND=${{ matrix.brand }} -e WORDMARK=${{ matrix.wordmark }} -e ES_HANDLE_TITLE="${{ matrix.es_handle_title }}"
      - uses: actions/upload-artifact@v4
        if: always() && steps.guard.outputs.present == 'true'
        with:
          name: maestro-android-${{ matrix.brand }}
          path: ~/.maestro/tests
          if-no-files-found: ignore
